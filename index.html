<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Éditeur de Code en Temps Réel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- CodeMirror CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.2/lib/codemirror.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.2/theme/dracula.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.2/theme/mdn-like.min.css">

<!-- Feuille de l'appli -->
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <span>🚀 Éditeur HTML Temps Réel</span>
  <div class="controls">
    <button id="themeToggle" title="Basculer le thème" aria-label="Thème">🌙</button>
    <button id="pasteCode"   title="Coller"        aria-label="Coller">📥</button>
    <button id="copyCode"    title="Copier"        aria-label="Copier">📋</button>
    <button id="clearCode"   title="Effacer"       aria-label="Effacer">🗑️</button>
    <button id="clearAllCode" title="Effacer tout" aria-label="Effacer tout">🧹</button>
    <button id="saveCode"    title="Sauvegarder"   aria-label="Sauvegarder">💾</button>
      <button id="saveProjectBtn" title="Enregistrer le projet" aria-label="Enregistrer le projet">📦</button>
    <button id="debugBtn" title="Debug focus éditeur" aria-label="Debug">🐞</button>
  </div>
</header>

<div class="main">
  <div id="editorPane">
    <div class="pane-header">
      <span>Votre CODE</span>
      <div class="tabs">
        <div class="tab" data-editor="html">HTML</div>
        <div class="tab" data-editor="css">CSS</div>
        <div class="tab" data-editor="js">JS</div>
      </div>
    </div>
    <div class="editor-container">
      <textarea id="htmlEditor"></textarea>
      <textarea id="cssEditor"></textarea>
      <textarea id="jsEditor"></textarea>
    </div>
  </div>

  <div id="resizer"></div>

  <div id="previewPane">
    <div class="pane-header">APERÇU</div>
    <iframe id="viewer" sandbox="allow-scripts" tabindex="-1"></iframe>
  </div>
</div>

<div id="status">Prêt</div>


<!-- Modal sauvegarde -->
<div id="saveModal" class="modal hidden">
  <div class="modal-content">
    <h3>Sauvegarder le fichier</h3>
    <input id="filename" placeholder="Nom du fichier" required>
    <div class="modal-buttons">
      <button id="confirmSaveBtn">Sauvegarder</button>
      <button id="cancelSaveBtn">Annuler</button>
    </div>
  </div>
</div>

<!-- Modal export ZIP avancé (séparée) -->
<div id="exportZipModal" class="modal hidden">
  <div class="modal-content">
    <h3>Exporter le projet (ZIP)</h3>
    <label for="zipFolderName">Nom du dossier&nbsp;:</label>
    <input id="zipFolderName" placeholder="mon_projet" value="mon_projet" required>
    <div class="modal-section">
      <input type="checkbox" id="zipIncludeReadme" checked>
      <label for="zipIncludeReadme">Inclure un README.md</label>
    </div>
    <div class="modal-section">
      <input type="checkbox" id="zipPreviewStructure" checked>
      <label for="zipPreviewStructure">Prévisualiser la structure avant export</label>
    </div>
    <div id="zipStructurePreview" class="hidden"></div>
    <div class="modal-buttons">
      <button id="confirmExportZipBtn">Exporter</button>
      <button id="cancelExportZipBtn">Annuler</button>
    </div>
  </div>
</div>

<!-- CodeMirror -->
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.2/lib/codemirror.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.2/mode/xml/xml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.2/mode/javascript/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.2/mode/css/css.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>

<!-- JSZip pour l'export ZIP -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<!-- Appli -->
<script src="main.js"></script>
</body>
</html>
